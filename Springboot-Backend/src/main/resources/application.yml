spring:
  application:
    name: bro-barber-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/barber}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:bro-barber-jwt-secret-key-change-this-in-production-must-be-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cookie-name: ${JWT_COOKIE_NAME:jwt-token}
